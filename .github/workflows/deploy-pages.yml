name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or commit SHA) to deploy"
        required: true
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
      deployed_sha: ${{ steps.meta.outputs.deployed_sha }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      - name: Run linter (fails on errors and warnings)
        run: npm run lint

      - name: Run tests
        run: npm run test

      # NEXT_PUBLIC_* is inlined at build time; empty var = WalletConnect omitted from bundle.
      - name: Check WalletConnect project id (build input)
        env:
          WC: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          # Set to true in repo Variables to fail deploy when WC id is missing.
          STRICT: ${{ vars.DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID }}
        run: |
          WC_TRIMMED="$(printf '%s' "$WC" | tr -d '\r\n' | xargs)"
          if [ -n "$WC_TRIMMED" ]; then
            echo "::notice::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set (raw length ${#WC}, trimmed length ${#WC_TRIMMED})."
            if [ "$WC" != "$WC_TRIMMED" ]; then
              echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID contains surrounding whitespace/newlines; trimmed value will be used by the app build."
            fi
          else
            echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is empty — WalletConnect will be omitted from the build."
            if [ "$STRICT" = "true" ] || [ "$STRICT" = "1" ]; then
              echo "::error::Strict mode: set repository variable NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID, or set DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID to false."
              exit 1
            fi
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Repository variable: Settings → Secrets and variables → Actions → Variables
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Capture deployed metadata
        id: meta
        run: echo "deployed_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  post_deploy_smoke:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Vault deep-link smoke (VOLTS vault on mainnet) — repo-relative path under SMOKE_BASE_URL
      SMOKE_PAGE_PATH: ./vault/?chain=1&address=0x5362D5086FDef73450145492a66F8EBF210c5B9C
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Log smoke URLs
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"
          REL="${SMOKE_PAGE_PATH#./}"
          SMOKE_FULL_URL="${BASE}/${REL}"
          echo "::notice::post_deploy_smoke — GitHub Pages base URL: ${PAGE_URL}"
          echo "::notice::post_deploy_smoke — Playwright baseURL (trimmed trailing slash): ${BASE}"
          echo "::notice::post_deploy_smoke — vault smoke path: ${SMOKE_PAGE_PATH}"
          echo "::notice::post_deploy_smoke — full vault URL under test: ${SMOKE_FULL_URL}"

      - name: Wait for vault smoke URL
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          if [ -z "$PAGE_URL" ]; then
            echo "::error::deploy job did not produce page_url"
            exit 1
          fi
          BASE="${PAGE_URL%/}"
          REL="${SMOKE_PAGE_PATH#./}"
          SMOKE_FULL_URL="${BASE}/${REL}"
          echo "Waiting for HTTP 200 from: ${SMOKE_FULL_URL}"
          ok=0
          for i in $(seq 1 36); do
            if curl -fsS --max-time 30 "$SMOKE_FULL_URL" >/dev/null; then
              ok=1
              break
            fi
            echo "Attempt $i: not ready yet, sleeping 10s"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Vault smoke URL did not become reachable in time"
            exit 1
          fi

      - name: Post-deploy smoke (Playwright)
        env:
          SMOKE_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run test:smoke

  mark_pages_deployment_failed:
    needs: [deploy, post_deploy_smoke]
    if: >-
      always() &&
      needs.deploy.result == 'success' &&
      needs.post_deploy_smoke.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    steps:
      - name: Mark current github-pages deployment as failure
        env:
          DEPLOYED_SHA: ${{ needs.deploy.outputs.deployed_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOYED_SHA:-}" ]; then
            echo "::error::Missing deployed SHA from deploy job."
            exit 1
          fi

          echo "::notice::Looking up github-pages deployment for SHA: ${DEPLOYED_SHA}"
          # NOTE: `gh api` with GET must pass filters as query string. `-f` sends a form body and does not apply here.
          QUERY="environment=github-pages&sha=${DEPLOYED_SHA}&per_page=30"
          DEPLOYMENT_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/deployments?${QUERY}")"
          echo "::notice::Deployments response (first 2000 chars): ${DEPLOYMENT_JSON:0:2000}"

          DEPLOYMENT_ID="$(echo "${DEPLOYMENT_JSON}" | jq -r 'if length == 0 then empty else (sort_by(.created_at) | reverse | .[0].id) end')"

          if [ -z "${DEPLOYMENT_ID:-}" ] || [ "${DEPLOYMENT_ID}" = "null" ]; then
            echo "::error::No github-pages deployment found for SHA ${DEPLOYED_SHA} (empty list or jq parse issue)."
            exit 1
          fi

          echo "::notice::Marking deployment ${DEPLOYMENT_ID} as failure (smoke test failed)."
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state='failure' \
            -f description='Post-deploy smoke test failed' \
            -f log_url="${RUN_URL}"

          echo "::notice::Deployment ${DEPLOYMENT_ID} status updated to failure."
