name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or commit SHA) to deploy"
        required: true
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write
  # upload-artifact / download-artifact (smoke outcome bridge for rollback)
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Vault deep-link smoke (VOLTS vault on mainnet) — repo-relative path under SMOKE_BASE_URL
  SMOKE_PAGE_PATH: ./vault/?chain=1&address=0x5362D5086FDef73450145492a66F8EBF210c5B9C

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
      deployed_sha: ${{ steps.meta.outputs.deployed_sha }}
      deploy_ref: ${{ steps.deploy_ref.outputs.deploy_ref }}
      rollback_eligible: ${{ steps.rollback_meta.outputs.rollback_eligible }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve deploy ref (for rollback)
        id: deploy_ref
        shell: bash
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "deploy_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "deploy_ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rollback eligibility (release, semver tag, or default branch)
        id: rollback_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          ref="${{ steps.deploy_ref.outputs.deploy_ref }}"
          ref_branch="${ref#refs/heads/}"
          eligible=false
          if [ "$EVENT_NAME" = "release" ]; then
            eligible=true
          elif [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            eligible=true
          elif [[ "$ref" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            eligible=true
          elif [ "$EVENT_NAME" = "push" ]; then
            # This workflow is configured for push on master; allow rollback on push runs.
            eligible=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && { [ "$ref" = "$DEFAULT_BRANCH" ] || [ "$ref_branch" = "$DEFAULT_BRANCH" ] || [ "$ref" = "master" ] || [ "$ref_branch" = "master" ]; }; then
            eligible=true
          fi
          echo "rollback_eligible=$eligible" >> "$GITHUB_OUTPUT"
          echo "::notice::deploy_ref=${ref} rollback_eligible=$eligible"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      - name: Run linter (fails on errors and warnings)
        run: npm run lint

      - name: Run tests
        run: npm run test

      # NEXT_PUBLIC_* is inlined at build time; empty var = WalletConnect omitted from bundle.
      - name: Check WalletConnect project id (build input)
        env:
          WC: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          # Set to true in repo Variables to fail deploy when WC id is missing.
          STRICT: ${{ vars.DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID }}
        run: |
          WC_TRIMMED="$(printf '%s' "$WC" | tr -d '\r\n' | xargs)"
          if [ -n "$WC_TRIMMED" ]; then
            echo "::notice::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set (raw length ${#WC}, trimmed length ${#WC_TRIMMED})."
            if [ "$WC" != "$WC_TRIMMED" ]; then
              echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID contains surrounding whitespace/newlines; trimmed value will be used by the app build."
            fi
          else
            echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is empty — WalletConnect will be omitted from the build."
            if [ "$STRICT" = "true" ] || [ "$STRICT" = "1" ]; then
              echo "::error::Strict mode: set repository variable NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID, or set DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID to false."
              exit 1
            fi
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Repository variable: Settings → Secrets and variables → Actions → Variables
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Capture deployed metadata
        id: meta
        run: echo "deployed_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Only runs after a successful deploy job. If `deploy` fails, this job is skipped (no URL to test).
  post_deploy_smoke:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      smoke_ok: ${{ steps.record_smoke.outputs.ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Log smoke URLs
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"
          REL="${SMOKE_PAGE_PATH#./}"
          SMOKE_FULL_URL="${BASE}/${REL}"
          echo "::notice::post-deploy smoke — GitHub Pages base URL: ${PAGE_URL}"
          echo "::notice::post-deploy smoke — vault smoke path: ${SMOKE_PAGE_PATH}"
          echo "::notice::post-deploy smoke — full vault URL under test: ${SMOKE_FULL_URL}"

      - name: Wait for vault smoke URL
        id: wait_smoke_url
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          if [ -z "$PAGE_URL" ]; then
            echo "::error::Deploy job did not produce page_url"
            exit 1
          fi
          BASE="${PAGE_URL%/}"
          REL="${SMOKE_PAGE_PATH#./}"
          SMOKE_FULL_URL="${BASE}/${REL}"
          echo "Waiting for HTTP 200 from: ${SMOKE_FULL_URL}"
          ok=0
          for i in $(seq 1 36); do
            if curl -fsS --max-time 30 "$SMOKE_FULL_URL" >/dev/null; then
              ok=1
              break
            fi
            echo "Attempt $i: not ready yet, sleeping 10s"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Vault smoke URL did not become reachable in time"
            exit 1
          fi

      - name: Post-deploy smoke (Playwright)
        id: playwright_smoke
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run test:smoke

      - name: Record smoke outcome
        id: record_smoke
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.playwright_smoke.outcome }}" = "success" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Post-deploy smoke passed."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Post-deploy smoke failed (outcome=${{ steps.playwright_smoke.outcome }})."
          fi

      - name: Write smoke result for downstream jobs
        if: always()
        run: printf '%s' "${{ steps.record_smoke.outputs.ok }}" > smoke-result.txt

      - name: Upload smoke outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-outcome
          path: smoke-result.txt
          retention-days: 3

      - name: Fail job when post-deploy smoke did not pass
        if: steps.record_smoke.outputs.ok != 'true'
        run: |
          echo "::error::Post-deploy smoke did not pass (see steps above)."
          exit 1

  # MUST use `if: always()` only. A compound `if` that references `needs.post_deploy_smoke.result` is
  # evaluated unreliably when that job fails, and GitHub leaves this job as skipped. All real checks
  # live in the first "Decide …" step (exit 0 = no-op job success, no Pages deploy).
  rollback_pages:
    needs: [deploy, post_deploy_smoke]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
      rollback_ran: ${{ steps.gate.outputs.should_rollback }}
    steps:
      - name: Decide whether to run Pages rollback
        id: gate
        shell: bash
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          POST_DEPLOY_RESULT: ${{ needs.post_deploy_smoke.result }}
          RB_ELIG: ${{ needs.deploy.outputs.rollback_eligible }}
          FAILED_REF: ${{ needs.deploy.outputs.deploy_ref }}
        run: |
          set -euo pipefail
          echo "::notice::rollback gate: deploy=${DEPLOY_RESULT} post_deploy_smoke=${POST_DEPLOY_RESULT} rollback_eligible=${RB_ELIG} deploy_ref=${FAILED_REF}"

          if [ "$DEPLOY_RESULT" != "success" ]; then
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=deploy_not_success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$RB_ELIG" != "true" ]; then
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=not_rollback_eligible" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$POST_DEPLOY_RESULT" = "success" ]; then
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=smoke_passed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$POST_DEPLOY_RESULT" = "skipped" ]; then
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=smoke_skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$POST_DEPLOY_RESULT" = "failure" ] || [ "$POST_DEPLOY_RESULT" = "cancelled" ]; then
            echo "should_rollback=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_rollback=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=unexpected_post_deploy_${POST_DEPLOY_RESULT}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Log rollback context
        if: steps.gate.outputs.should_rollback == 'true'
        shell: bash
        env:
          FAILED_REF: ${{ needs.deploy.outputs.deploy_ref }}
        run: |
          echo "::notice::Post-deploy smoke did not succeed for ref ${FAILED_REF}. Redeploying previous tag to GitHub Pages."

      - name: Download smoke outcome (optional sanity check)
        if: steps.gate.outputs.should_rollback == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: smoke-outcome
          path: smoke-out

      - name: Verify smoke artifact agrees with failed job
        if: steps.gate.outputs.should_rollback == 'true'
        shell: bash
        run: |
          f="smoke-outcome/smoke-result.txt"
          if [ -f "$f" ] && [ "$(tr -d '\n' < "$f")" = "true" ]; then
            echo "::warning::smoke-result.txt says passed but smoke job failed; continuing rollback anyway."
          fi

      - name: Checkout (full history + tags)
        if: steps.gate.outputs.should_rollback == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve previous tag
        if: steps.gate.outputs.should_rollback == 'true'
        id: prev_tag
        shell: bash
        env:
          CURRENT: ${{ needs.deploy.outputs.deploy_ref }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          raw="${CURRENT#refs/tags/}"
          raw="${raw#refs/heads/}"
          current="$raw"

          tags=()
          while IFS= read -r t; do
            [[ -n "$t" ]] && tags+=("$t")
          done < <(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' '[0-9]*.[0-9]*.[0-9]*' --sort=-creatordate)

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "::error::No semver tags (X.Y.Z or vX.Y.Z) in repo; cannot roll back (deploy ref: ${CURRENT})."
            exit 1
          fi

          PREV=""
          if [[ "$current" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            current_alt=""
            if [[ "$current" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              current_alt="${current#v}"
            else
              current_alt="v${current}"
            fi
            seen_current=false
            found=false
            for t in "${tags[@]}"; do
              if [ "$seen_current" = true ]; then
                PREV="$t"
                break
              fi
              if [ "$t" = "$current" ] || [ "$t" = "$current_alt" ]; then
                seen_current=true
                found=true
              fi
            done
            if [ -n "$PREV" ]; then
              echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"
              echo "::notice::Rollback: ${CURRENT} -> $PREV (chronologically previous tag)"
              exit 0
            fi
            if [ "$found" = true ]; then
              echo "::error::No chronologically earlier tag (deploy ref: ${CURRENT})."
              exit 1
            fi
            echo "::error::Deploy ref looks like semver but is not a tag in this repo: ${CURRENT}"
            exit 1
          fi

          PREV="${tags[0]}"
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"
          echo "::notice::Rollback non-tag deploy ${raw} -> newest tag ${PREV} (by creatordate)"

      - name: Checkout rollback ref
        if: steps.gate.outputs.should_rollback == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prev_tag.outputs.prev_tag }}

      - name: Setup Node.js
        if: steps.gate.outputs.should_rollback == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        if: steps.gate.outputs.should_rollback == 'true'
        run: npm ci --legacy-peer-deps

      - name: Disable Next.js telemetry
        if: steps.gate.outputs.should_rollback == 'true'
        run: npx next telemetry disable

      - name: Run linter (fails on errors and warnings)
        if: steps.gate.outputs.should_rollback == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.gate.outputs.should_rollback == 'true'
        run: npm run test

      - name: Check WalletConnect project id (build input)
        if: steps.gate.outputs.should_rollback == 'true'
        env:
          WC: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          STRICT: ${{ vars.DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID }}
        run: |
          WC_TRIMMED="$(printf '%s' "$WC" | tr -d '\r\n' | xargs)"
          if [ -n "$WC_TRIMMED" ]; then
            echo "::notice::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set (raw length ${#WC}, trimmed length ${#WC_TRIMMED})."
            if [ "$WC" != "$WC_TRIMMED" ]; then
              echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID contains surrounding whitespace/newlines; trimmed value will be used by the app build."
            fi
          else
            echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is empty — WalletConnect will be omitted from the build."
            if [ "$STRICT" = "true" ] || [ "$STRICT" = "1" ]; then
              echo "::error::Strict mode: set repository variable NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID, or set DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID to false."
              exit 1
            fi
          fi

      - name: Build static site
        if: steps.gate.outputs.should_rollback == 'true'
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Configure Pages
        if: steps.gate.outputs.should_rollback == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.should_rollback == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy rollback to GitHub Pages
        if: steps.gate.outputs.should_rollback == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Log published app version (optional curl)
        if: steps.gate.outputs.should_rollback == 'true' && success()
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PAGE_URL:-}" ]; then
            echo "::warning::No page_url; skipping manifest version check."
            exit 0
          fi
          manifest_url="${PAGE_URL%/}/manifest.json"
          echo "Trying to fetch ${manifest_url}"
          ok=0
          body=""
          for i in $(seq 1 24); do
            if body="$(curl -fsS --max-time 25 "$manifest_url" 2>/dev/null)"; then
              ok=1
              break
            fi
            echo "Attempt $i: manifest.json not ready, sleeping 10s"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::Could not fetch manifest.json after rollback (site may still be propagating)."
            exit 0
          fi
          ver="$(printf '%s' "$body" | jq -r '.version // empty' 2>/dev/null || true)"
          if [ -n "$ver" ]; then
            echo "::notice::Published manifest version after rollback: ${ver}"
          else
            echo "::notice::Published manifest.json after rollback (raw): ${body}"
          fi

  smoke_gate:
    needs: [deploy, post_deploy_smoke, rollback_pages]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce primary smoke or successful rollback deploy
        shell: bash
        env:
          POST_DEPLOY: ${{ needs.post_deploy_smoke.result }}
          RB_RESULT: ${{ needs.rollback_pages.result }}
          RB_ELIG: ${{ needs.deploy.outputs.rollback_eligible }}
          ROLLBACK_RAN: ${{ needs.rollback_pages.outputs.rollback_ran }}
        run: |
          set -euo pipefail
          if [ "$POST_DEPLOY" = "success" ]; then
            echo "::notice::Primary post-deploy smoke passed."
            exit 0
          fi

          if [ "$RB_ELIG" != "true" ]; then
            echo "::error::Post-deploy smoke did not succeed. Automatic rollback runs for a published Release, a vX.Y.Z / X.Y.Z deploy ref, or push / workflow_dispatch on the repository default branch."
            exit 1
          fi

          if [ "$RB_RESULT" = "success" ] && [ "$ROLLBACK_RAN" = "true" ]; then
            echo "::notice::Rollback Pages deploy ran after failed smoke (see rollback job for manifest curl log)."
            exit 0
          fi

          if [ "$RB_RESULT" = "success" ] && [ "$ROLLBACK_RAN" != "true" ]; then
            echo "::error::Smoke failed and rollback was eligible, but rollback_pages did not deploy (gate no-op). Inspect the Decide whether to run Pages rollback step in rollback_pages."
            exit 1
          fi

          echo "::error::Post-deploy smoke did not succeed and rollback did not complete (post_deploy=${POST_DEPLOY}, rollback=${RB_RESULT})."
          exit 1

  finalize_deployment:
    needs: smoke_gate
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Final deployment marker
        run: |
          echo "OK: deploy + post-deploy smoke passed, or rollback deploy completed after failed smoke."
