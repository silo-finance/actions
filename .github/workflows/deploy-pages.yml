name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or commit SHA) to deploy"
        required: true
        default: ""
      is_rollback:
        description: "Internal — set by auto-rollback to avoid nested rollbacks"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
      deployed_sha: ${{ steps.deployed.outputs.sha }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      - name: Run linter (fails on errors and warnings)
        run: npm run lint

      - name: Run tests
        run: npm run test

      # NEXT_PUBLIC_* is inlined at build time; empty var = WalletConnect omitted from bundle.
      - name: Check WalletConnect project id (build input)
        env:
          WC: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          # Set to true in repo Variables to fail deploy when WC id is missing.
          STRICT: ${{ vars.DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID }}
        run: |
          WC_TRIMMED="$(printf '%s' "$WC" | tr -d '\r\n' | xargs)"
          if [ -n "$WC_TRIMMED" ]; then
            echo "::notice::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is set (raw length ${#WC}, trimmed length ${#WC_TRIMMED})."
            if [ "$WC" != "$WC_TRIMMED" ]; then
              echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID contains surrounding whitespace/newlines; trimmed value will be used by the app build."
            fi
          else
            echo "::warning::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID is empty — WalletConnect will be omitted from the build."
            if [ "$STRICT" = "true" ] || [ "$STRICT" = "1" ]; then
              echo "::error::Strict mode: set repository variable NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID, or set DEPLOY_REQUIRE_WALLETCONNECT_PROJECT_ID to false."
              exit 1
            fi
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Repository variable: Settings → Secrets and variables → Actions → Variables
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployed SHA
        id: deployed
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  post_deploy_smoke:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Wait for Pages URL
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ -z "$PAGE_URL" ]; then
            echo "::error::deploy job did not produce page_url"
            exit 1
          fi
          echo "Waiting for $PAGE_URL ..."
          ok=0
          for i in $(seq 1 36); do
            if curl -fsS --max-time 30 "$PAGE_URL" >/dev/null; then
              ok=1
              break
            fi
            echo "Attempt $i: not ready yet, sleeping 10s"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Site did not become reachable in time"
            exit 1
          fi

      - name: Post-deploy smoke (Playwright)
        env:
          SMOKE_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run test:smoke

  auto_rollback:
    needs: [deploy, post_deploy_smoke]
    if: >-
      always() &&
      needs.deploy.result == 'success' &&
      needs.post_deploy_smoke.result == 'failure' &&
      github.event.inputs.is_rollback != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout (history for rollback SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve rollback commit
        id: rollback
        env:
          DEPLOYED_SHA: ${{ needs.deploy.outputs.deployed_sha }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          ZERO=0000000000000000000000000000000000000000
          if [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            SHA="$BEFORE"
            echo "Using push event before: $SHA"
          else
            SHA=$(git rev-parse "${DEPLOYED_SHA}^")
            echo "Using parent of deployed commit: $SHA"
          fi
          if [ "$SHA" = "$DEPLOYED_SHA" ]; then
            echo "::error::Rollback SHA equals deployed SHA; aborting."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Dispatch rollback deploy
        uses: actions/github-script@v7
        env:
          ROLLBACK_SHA: ${{ steps.rollback.outputs.sha }}
        with:
          script: |
            const sha = process.env.ROLLBACK_SHA
            if (!sha || sha.length < 7) {
              core.setFailed(`Invalid ROLLBACK_SHA: ${sha}`)
              return
            }
            core.info(`Dispatching deploy workflow for rollback ref: ${sha}`)
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'master',
              inputs: {
                ref: sha,
                is_rollback: 'true',
              },
            })
